<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="320" height="80" rx="14" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="18" y="18" width="5" height="44" rx="2.5" fill="url(#accent)"/>

  <!-- Mark: stylised < > bracket pair -->
  <text x="36" y="54" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="36" font-weight="700" fill="url(#accent)">&lt;/&gt;</text>

  <!-- sfg wordmark -->
  <text x="104" y="48" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="30" font-weight="800" letter-spacing="-1" fill="#ffffff">sfg</text>

  <!-- labs in accent -->
  <text x="157" y="48" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="30" font-weight="300" letter-spacing="1" fill="url(#accent)">labs</text>

  <!-- Tagline -->
  <text x="104" y="65" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="400" letter-spacing="2" fill="#6b7280">FAITH &amp; GAMBLE IT</text>
</svg>
